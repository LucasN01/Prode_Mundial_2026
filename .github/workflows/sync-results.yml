name: Sync World Cup Results
#V2
on:
  schedule:
    # Corre cada 5 minutos entre las 13:00 y 06:59 UTC (10:00-03:59 Argentina y )
    - cron: '*/5 13-23,0-6 * * *'
  # También permite correrlo manualmente desde GitHub
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sync/package.json

      - name: Install dependencies
        run: npm install
        working-directory: sync

      - name: Run sync script
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node sync-results.js
        working-directory: sync
